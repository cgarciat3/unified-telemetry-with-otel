input {
  beats {
    port => 5044
    ssl_enabled => false
  }
}

filter {
  if "host" in [tags] {
    grok {
      match => {"message" => "%{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:logsource} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:log_message}"}
    }
  } else if "nginx" in [tags] and "access" in [tags] {
    json { source => "message" }
  } else if "elk_app" in [tags] {
    json { source => "message" }
  }
}

output {
  if "nginx" in [tags] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "elastic"
      ssl_verification_mode => "none"
      index => "nginx-logs-%{+YYYY.MM.dd}"
    }
  } else if "host" in [tags] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "elastic"
      ssl_verification_mode => "none"
      index => "host-logs-%{+YYYY.MM.dd}"
    }
  } else if "elk_app" in [tags] {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "elastic"
      ssl_verification_mode => "none"
      index => "elk-app-logs-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["https://localhost:9200"]
      user => "elastic"
      password => "elastic"
      ssl_verification_mode => "none"
      index => "default-logs-%{+YYYY.MM.dd}"
    }
  }
}
