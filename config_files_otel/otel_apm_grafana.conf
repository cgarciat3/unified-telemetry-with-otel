receivers:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      load: {}
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk: {}
      filesystem: {}
      network: {}

  filelog/linux_host:
    include: ["/var/log/*.log"]
    operators:
      - type: regex_parser
        regex: '^(?P<header>(?P<timestamp_ext>[^ ]+) (?P<host>[^ ]+) (?P<program>[^ \[:]+)(?:\[(?P<pid>[0-9]+)\])?): (?P<body>.*)$'

  filelog/nginx_access:
    include: ["/var/log/nginx/access.log"]
    operators:
      - type: json_parser
        parse_to: body
      - type: trace_parser
        trace_id:
          parse_from: body.trace_id
        span_id:
          parse_from: body.span_id

  filelog/nginx_error:
    include: ["/var/log/nginx/error.log"]
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (\*(?P<connection_id>\d+) )?(?P<message>.*)$'
      - type: severity_parser
        parse_from: attributes.level
        mapping:
          info: info
          notice: info
          warn: warn
          error: error
          crit: fatal
          alert: fatal
          emerg: fatal

  nginx/stub_status:
    endpoint: "http://localhost/nginx_status"

  otlp:
    protocols:
      grpc:


processors:
  batch:

  transform/linux_semconvs:
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["host.name"], attributes["host"])
          - set(resource.attributes["process.executable.name"], attributes["program"])
          - set(resource.attributes["process.pid"], Int(attributes["pid"])) where attributes["pid"] != nil
          - set(attributes["time_unix_nano"], attributes["timestamp_ext"])
          - delete_key(attributes, "host")
          - delete_key(attributes, "program")
          - delete_key(attributes, "pid")
          - delete_key(attributes, "timestamp_ext")
          - delete_key(attributes, "header")

  transform/nginx_access_semconv:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(attributes["http.request.method"], body["request_method"])
          - set(attributes["url.path"], body["request_path"])
          - set(attributes["http.response.status_code"], Int(body["response_status"]))
          - set(attributes["http.response.body.size"], Int(body["body_bytes_sent"]))
          - set(attributes["client.address"], body["remote_addr"])
          - set(attributes["user_agent.original"], body["http_user_agent"])
          - set(attributes["http.request.header.referer"], body["http_referrer"])
          - set(attributes["nginx.request.time"], Double(body["request_time"]))
          - set(attributes["http.client.request.time"], Double(body["app_response_time"]))
          - set(attributes["network.connection.duration"], Double(body["connection_time"]))

  transform/nginx_error_semconv:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, attributes["message"])
          - set(attributes["process.pid"], Int(attributes["pid"]))
          - set(attributes["process.thread.id"], Int(attributes["tid"]))
          - set(attributes["nginx.connection_id"], Int(attributes["connection_id"])) where attributes["connection_id"] != nil
          - delete_key(attributes, "time")
          - delete_key(attributes, "level")
          - delete_key(attributes, "pid")
          - delete_key(attributes, "tid")
          - delete_key(attributes, "message")
          - delete_key(attributes, "connection_id")

  resourcedetection:
    detectors: [system, env]
    timeout: 2s
    override: true

  resource/linux_service_name:
    attributes:
      - key: service.name
        value: "linux"
        action: upsert

  resource/nginx_service_name:
    attributes:
      - key: service.name
        value: "nginx"
        action: upsert


exporters:
  otlp/apm:
    endpoint: "192.168.1.135:8200"
    tls:
      insecure: true
      #insecure_skip_verify: true
    headers:
      Authorization: "Bearer RqLHYdGKZVjelhb1xvoaUwderykZOpIdSXMjPtV9OcxT9TyBALZkX2DhAZls1BHH"

  debug:
    verbosity: detailed

  otlp/jaeger:
    endpoint: "192.168.1.137:4317"
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: "http://192.168.1.137:3100/otlp"
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:9464"
    enable_open_metrics: true #To allow exemplars
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true
    translation_strategy: "UnderscoreEscapingWithoutSuffixes"


service:
  pipelines:
    metrics/host_linux:
      receivers: [hostmetrics]
      processors: [batch, resourcedetection, resource/linux_service_name]
      exporters: [ prometheus, otlp/apm]

    metrics/nginx_stub_status:
      receivers: [nginx/stub_status]
      processors: [batch, resourcedetection, resource/nginx_service_name]
      exporters: [ prometheus, otlp/apm]

    metrics/app_otel:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [prometheus, otlp/apm]

    logs/host_linux:
      receivers: [filelog/linux_host]
      processors: [batch, transform/linux_semconvs, resourcedetection, resource/linux_service_name]
      exporters: [otlphttp/loki, otlp/apm]

    logs/nginx_access:
      receivers: [filelog/nginx_access]
      processors: [batch, resourcedetection, transform/nginx_access_semconv, resource/nginx_service_name]
      exporters: [ otlphttp/loki, otlp/apm]

    logs/nginx_error:
      receivers: [filelog/nginx_error]
      processors: [batch, resourcedetection, transform/nginx_error_semconv, resource/nginx_service_name]
      exporters: [otlphttp/loki, otlp/apm]

    logs/app_otel:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [otlphttp/loki, otlp/apm]

    traces:
      receivers: [otlp]
      processors: [batch, resourcedetection]
      exporters: [otlp/jaeger, otlp/apm]
