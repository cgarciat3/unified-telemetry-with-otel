receivers:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      load: {}
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk: {}
      filesystem: {}
      network: {}

  filelog/linux_host:
    include: ["/var/log/*.log"]
    operators:
      - type: regex_parser
        regex: '^(?P<header>(?P<timestamp_ext>[^ ]+) (?P<host>[^ ]+) (?P<program>[^ \[:]+)(?:\[(?P<pid>[0-9]+)\])?): (?P<body>.*)$'
      - type: add
        field: "attributes.service.name"
        value: "linux"

  filelog/nginx_access:
    include: ["/var/log/nginx/access.log"]
    operators:
      - type: json_parser
        parse_to: body
#      - type: add
#        field: "attributes.service.name"
#        value: "nginx"

  filelog/nginx_error:
    include: ["/var/log/nginx/error.log"]
    start_at: end
    operators:
      - type: regex_parser
        regex: '^(?P<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (\*(?P<connection_id>\d+) )?(?P<message>.*)$'
      - type: severity_parser
        parse_from: attributes.level
        mapping:
          info: info
          notice: info
          warn: warn
          error: error
          crit: fatal
          alert: fatal
          emerg: fatal
      - type: add
        field: "attributes.service.name"
        value: "nginx"

  nginx/stub_status:
    endpoint: "http://localhost/nginx_status"

  otlp:
    protocols:
      grpc:


processors:
  batch:

  transform/linux_semconvs:
    log_statements:
      - context: log
        statements:
          - set(resource.attributes["host.name"], attributes["host"])
          - set(resource.attributes["process.executable.name"], attributes["program"])
          - set(resource.attributes["process.pid"], Int(attributes["pid"])) where attributes["pid"] != nil
          - set(attributes["time_unix_nano"], attributes["timestamp_ext"])
          - delete_key(attributes, "host")
          - delete_key(attributes, "program")
          - delete_key(attributes, "pid")
          - delete_key(attributes, "timestamp_ext")
          - delete_key(attributes, "header")

  transform/nginx_access_semconv:
    log_statements:
      - context: log
        statements:
          - set(attributes["http.request.method"], body["request_method"])
          - set(attributes["url.path"], body["request_path"])
          - set(attributes["http.response.status_code"], Int(body["response_status"]))
          - set(attributes["http.response.body.size"], Int(body["body_bytes_sent"]))
          - set(attributes["client.address"], body["remote_addr"])
          - set(attributes["user_agent.original"], body["http_user_agent"])
          - set(attributes["http.request.header.referer"], body["http_referrer"])
          - set(attributes["nginx.request.time"], Double(body["request_time"]))

  transform/nginx_error_semconv:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, attributes["message"])
          - set(attributes["process.pid"], Int(attributes["pid"]))
          - set(attributes["process.thread.id"], Int(attributes["tid"]))
          - set(attributes["nginx.connection_id"], Int(attributes["connection_id"])) where attributes["connection_id"] != nil
          - delete_key(attributes, "time")
          - delete_key(attributes, "level")
          - delete_key(attributes, "pid")
          - delete_key(attributes, "tid")
          - delete_key(attributes, "message")
          - delete_key(attributes, "connection_id")

  resourcedetection:
    detectors: [system, env]
    timeout: 2s
    override: true

  resource/linux_host_logs:
    attributes:
      - key: data_stream.dataset
        value: "linux_syslog"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/linux_host_metrics:
    attributes:
      - key: data_stream.dataset
        value: "linux_metrics"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/nginx_access:
    attributes:
      - key: data_stream.dataset
        value: "nginx_access"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/nginx_error:
    attributes:
      - key: data_stream.dataset
        value: "nginx_error"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/nginx_stub_status:
    attributes:
      - key: data_stream.dataset
        value: "nginx_stub_status"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert
      - key: service.name
        value: "nginx"
        action: upsert

  resource/nginx_stub_status_add_service:
    attributes:
      - key: service.name
        value: "nginx"
        action: upsert

  resource/app_otel_logs:
    attributes:
      - key: data_stream.dataset
        value: "app_otel_logs"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/traces_unified:
    attributes:
      - key: data_stream.dataset
        value: "unified_tracing"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/app_otel_metrics:
    attributes:
      - key: data_stream.dataset
        value: "app_otel_metrics"
        action: upsert
      - key: data_stream.namespace
        value: "prod"
        action: upsert

  resource/linux_service:
    attributes:
      - key: service.name
        value: "linux"
        action: upsert

